name: swen
description: A minimalist Flutter news app with offline support and bookmarks
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  dio: ^5.4.0
  
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  webview_flutter: ^4.4.2
  
  cached_network_image: ^3.3.0
  
  shimmer: ^3.0.0
  
  flutter_animate: ^4.3.0
  
  go_router: ^13.0.0
  
  uuid: ^4.2.2
  
  connectivity_plus: ^5.0.2
  
  flutter_html: ^3.0.0-beta.2
  
  share_plus: ^7.2.1
  
  intl: ^0.19.0
  
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  
  assets:
    - .env
  
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Light.ttf
          weight: 300
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
    - family: DM Mono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
          weight: 400
